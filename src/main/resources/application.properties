# Server
server.port=${APP_PORT:8080}

# App name
spring.application.name=opdqueue

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opdqueue}
spring.datasource.username=${DB_USER:opdqueue_user}
spring.datasource.password=${DB_PASSWORD:opdqueue_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# App custom props
app.base-url=${BASE_URL:http://localhost:8080}
app.r2.enabled=false
app.r2.endpoint=${R2_ENDPOINT}
app.r2.access-key=${R2_ACCESS_KEY}
app.r2.secret-key=${R2_SECRET_KEY}
app.r2.bucket-name=${R2_BUCKET_NAME}
app.r2.public-url=${R2_PUBLIC_URL}