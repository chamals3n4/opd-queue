<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Board — OPD Queue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --green-700: #15803d;
            --green-800: #166534;
            --green-900: #14532d;
            --green-50: #f0fdf4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(160deg, #0f172a 0%, #14532d 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        .board-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 2rem;
        }
        .board-header {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255,255,255,.1);
        }
        .board-header .hospital-name {
            font-size: 1rem;
            opacity: .7;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .board-header .dept-name {
            font-size: 1.8rem;
            font-weight: 300;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .now-serving {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .now-serving-label {
            font-size: 1.2rem;
            opacity: .6;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .now-serving-number {
            font-size: 7rem;
            font-weight: 900;
            color: var(--green-50);
            text-shadow: 0 0 60px rgba(22,163,74,.4);
            letter-spacing: 4px;
        }
        .now-serving-number.waiting {
            color: rgba(255,255,255,.5);
            font-size: 2.5rem;
            text-shadow: none;
        }
        .board-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 1.5rem;
            border-top: 2px solid rgba(255,255,255,.1);
        }
        .next-list {
            flex: 1;
        }
        .next-label {
            font-size: .75rem;
            opacity: .5;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: .5rem;
        }
        .next-tickets {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .next-ticket {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 10px;
            padding: 8px 18px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .waiting-count {
            text-align: right;
        }
        .waiting-number {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .waiting-label {
            font-size: .75rem;
            opacity: .5;
            letter-spacing: 2px;
        }
        .board-time {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: .9rem;
            opacity: .5;
        }
    </style>
</head>
<body>

<div class="board-time" id="clock"></div>

<div class="board-container">
    <div class="board-header">
        <div class="hospital-name">Government Hospital</div>
        <div class="dept-name" id="deptName">Loading...</div>
    </div>

    <div class="now-serving">
        <div class="now-serving-label">Now Serving</div>
        <div class="now-serving-number" id="currentTicket">—</div>
    </div>

    <div class="board-footer">
        <div class="next-list">
            <div class="next-label">Up Next</div>
            <div class="next-tickets" id="nextTickets">
                <span class="next-ticket" style="opacity:.4">—</span>
            </div>
        </div>
        <div class="waiting-count">
            <div class="waiting-number" id="totalWaiting">0</div>
            <div class="waiting-label">Waiting</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const departmentId = /*[[${departmentId}]]*/ 1;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 10000);

    function updateBoard(data) {
        document.getElementById('deptName').textContent = data.departmentName || '—';

        const currentEl = document.getElementById('currentTicket');
        const current = data.currentlyCalledTicket;
        if (current && current !== '-') {
            currentEl.textContent = current;
            currentEl.classList.remove('waiting');
        } else {
            currentEl.textContent = '—';
            currentEl.classList.add('waiting');
        }

        const nextContainer = document.getElementById('nextTickets');
        const nextTickets = data.nextTickets || [];
        if (nextTickets.length === 0) {
            nextContainer.innerHTML = '<span class="next-ticket" style="opacity:.4">—</span>';
        } else {
            nextContainer.innerHTML = nextTickets.map(t => `<span class="next-ticket">${t}</span>`).join('');
        }

        document.getElementById('totalWaiting').textContent = data.totalWaiting || 0;
    }

    // Initial load
    fetch(`/api/display/${departmentId}`)
        .then(r => r.json())
        .then(updateBoard);

    // WebSocket updates
    const socket = new SockJS('/ws');
    const stomp = Stomp.over(socket);
    stomp.connect({}, () => {
        stomp.subscribe(`/topic/queue/${departmentId}`, msg => {
            const data = JSON.parse(msg.body);
            updateBoard(data);
        });
        stomp.subscribe(`/topic/queue/${departmentId}/count`, msg => {
            document.getElementById('totalWaiting').textContent = msg.body;
        });
    });
</script>

</body>
</html>
