<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPD Display Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/carbon.css}">
    <link rel="stylesheet" th:href="@{/css/display-board.css}">
</head>
<body>

<header>
    <div class="header-left">
        <div class="header-logo">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <rect x="2" y="2" width="18" height="18" stroke="#fff" stroke-width="1.5"/>
                <path d="M11 7v8M7 11h8" stroke="#fff" stroke-width="1.5" stroke-linecap="square"/>
            </svg>
            <span class="header-logo-text">OPD Queue</span>
        </div>
        <span class="header-dept" id="deptName">Loading...</span>
    </div>
    <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div>Live</div>
        <div class="clock" id="clock">--:--</div>
    </div>
</header>

<main>
    <div class="serving-panel">
        <div class="serving-label">Now Serving</div>
        <div class="serving-number idle" id="currentTicket">Waiting...</div>
    </div>
    <div class="side-panel">
        <div class="side-block">
            <div class="side-label">Up Next</div>
            <div class="next-list" id="nextTickets">
                <div class="next-empty">No patients waiting</div>
            </div>
        </div>
        <div class="side-block count-block">
            <div class="count-num" id="totalWaiting">0</div>
            <div class="count-lbl">Waiting</div>
        </div>
    </div>
</main>

<footer>
    <div class="footer-tip">Scan QR on your ticket to check your status on your phone</div>
    <div class="footer-url" id="footerUrl"></div>
</footer>

<script th:inline="javascript">const DEPT_ID = [[${departmentId}]];</script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/display-board.js}"></script>
</body>
</html>
