<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
        />
        <title>Your Queue Status - OPD Queue</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" th:href="@{/css/carbon.css}" />
        <link rel="stylesheet" th:href="@{/css/patient-status.css}" />
    </head>
    <body>
        <div class="topbar">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <rect
                    x="1.5"
                    y="1.5"
                    width="15"
                    height="15"
                    stroke="#fff"
                    stroke-width="1.4"
                />
                <path
                    d="M9 5.5v7M5.5 9h7"
                    stroke="#fff"
                    stroke-width="1.4"
                    stroke-linecap="square"
                />
            </svg>
            <span class="topbar-name">OPD Queue</span>
            <span class="topbar-sub">Queue Status</span>
        </div>

        <div class="card">
            <div class="card-header" id="cardHeader">
                <div class="header-label">Your Queue Ticket</div>
                <div
                    class="ticket-num"
                    id="ticketNumber"
                    th:text="${ticketNumber}"
                >
                    OPD-00000000-0000
                </div>
                <span class="status-badge status-WAITING" id="statusBadge"
                    ><span class="bdot"></span>Waiting</span
                >
            </div>

            <div class="connection-lost" id="connectionLost">
                Connection lost. Using cached data.
            </div>

            <div class="called-banner" id="calledBanner">
                <div class="called-title">Your Turn Is Here!</div>
                <div class="called-sub">
                    Please proceed to the consultation room
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Your Position</div>
                    <div class="stat-value teal" id="queuePos">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">People Ahead</div>
                    <div class="stat-value amber" id="peopleAhead">—</div>
                </div>
                <div class="stat full">
                    <div class="stat-label">Estimated Wait</div>
                    <div class="stat-value sm" id="waitTime">—</div>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-top">
                    <span>Queue Progress</span>
                    <span id="progLabel">—</span>
                </div>
                <div class="prog-bg">
                    <div
                        class="prog-fill"
                        id="progFill"
                        style="width: 0%"
                    ></div>
                </div>
            </div>

            <div class="dept-row">
                <span class="dept-lbl">Department</span>
                <span class="dept-val" id="deptName">—</span>
            </div>

            <div class="share-row">
                <span class="share-lbl">Your status link</span>
                <span
                    class="share-url"
                    id="shareUrl"
                    onclick="copyLink()"
                    title="Click to copy"
                ></span>
                <span class="share-copied" id="shareCopied">Copied!</span>
            </div>

            <div class="card-footer">
                <div class="live-ind">
                    <div class="live-dot"></div>
                    Connected
                </div>
                <div class="upd-time" id="updTime">—</div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
        <script th:src="@{/js/patient-status.js}"></script>
    </body>
</html>
